<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRN Multi-Game Dashboard</title>
    <style>
        :root {
            --val-red: #ff4655;
            --lol-gold: #c8aa6e;
            --val-dark: #111111;
            --val-gray: #ece8e1;
            --bg-panel: rgba(255, 255, 255, 0.05);
            --theme-color: var(--val-red); 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--val-dark);
            color: var(--val-gray);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            margin: 0;
            transition: background-color 0.3s;
        }

        h1 { color: var(--theme-color); text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s; }

        .game-selector { display: flex; gap: 15px; margin-bottom: 20px; }

        .game-tab {
            padding: 10px 20px; background-color: #222; color: #888;
            border: 2px solid transparent; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 16px; transition: 0.2s;
        }

        .game-tab.active { color: white; border-color: var(--theme-color); background-color: rgba(255, 255, 255, 0.1); }

        .search-container {
            background-color: var(--bg-panel); padding: 20px; border-radius: 8px;
            display: flex; gap: 10px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            justify-content: center; flex-wrap: wrap; max-width: 600px;
        }

        input, select {
            padding: 10px; font-size: 16px; border: none; border-radius: 4px;
            background-color: #222; color: white; outline: none;
        }
        input:focus, select:focus { box-shadow: 0 0 0 2px var(--theme-color); }

        button.action-btn {
            padding: 10px 20px; font-size: 16px; font-weight: bold;
            background-color: var(--theme-color); color: white; border: none;
            border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        button.action-btn:hover { filter: brightness(1.2); }
        
        #status { font-size: 14px; color: #aaa; margin-bottom: 20px; height: 20px; text-align: center; }

        .dashboard {
            display: none; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 600px;
        }

        .stat-box {
            background-color: var(--bg-panel); border-radius: 8px; padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .profile-icon { width: 100px; height: 100px; border-radius: 8px; border: 2px solid var(--theme-color); margin-bottom: 15px; }
        .error { color: var(--theme-color); font-weight: bold; text-align: center; width: 100%; }
        
        .stat-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; text-align: left;
        }
        .stat-item {
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px;
        }
    </style>
</head>
<body>

    <h1 id="pageTitle">TRN Valorant Tracker</h1>

    <div class="game-selector">
        <button class="game-tab active" id="tab-val" onclick="switchGame('valorant')">Valorant</button>
        <button class="game-tab" id="tab-lol" onclick="switchGame('lol')">League of Legends</button>
    </div>

    <div class="search-container" id="searchInputs">
        </div>

    <div id="status">Ready. Select a game and enter a Riot ID.</div>
    <div id="errorMsg" class="error"></div>

    <div class="dashboard" id="dashboard">
        </div>

    <script>
        // Your TRN API Key
        const trnApiKey = '8b483a0a-7d90-49fe-912b-911f5296d6c9'; 

        // We use a proxy to bypass strict browser CORS rules for local testing
        const proxyUrl = 'https://corsproxy.io/?';

        let currentGame = 'valorant';
        window.onload = () => switchGame('valorant');

        function switchGame(game) {
            currentGame = game;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('errorMsg').innerText = '';
            document.querySelectorAll('.game-tab').forEach(tab => tab.classList.remove('active'));
            
            const root = document.documentElement;
            const searchContainer = document.getElementById('searchInputs');

            if (game === 'valorant') {
                document.getElementById('tab-val').classList.add('active');
                root.style.setProperty('--theme-color', 'var(--val-red)');
                document.getElementById('pageTitle').innerText = "TRN Valorant Tracker";
                searchContainer.innerHTML = `
                    <input type="text" id="riotName" placeholder="Riot ID" required>
                    <input type="text" id="riotTag" placeholder="Tag" required style="width: 100px;">
                    <button class="action-btn" onclick="fetchTRNData('valorant')">Search Valorant</button>
                `;
            } else if (game === 'lol') {
                document.getElementById('tab-lol').classList.add('active');
                root.style.setProperty('--theme-color', 'var(--lol-gold)');
                document.getElementById('pageTitle').innerText = "TRN League Tracker";
                searchContainer.innerHTML = `
                    <input type="text" id="riotName" placeholder="Riot ID" required>
                    <input type="text" id="riotTag" placeholder="Tag" required style="width: 100px;">
                    <button class="action-btn" onclick="fetchTRNData('league-of-legends')">Search LoL</button>
                `;
            }
        }

        async function fetchTRNData(gamePath) {
            const name = document.getElementById('riotName').value.trim();
            const tag = document.getElementById('riotTag').value.trim().replace('#', '');
            const resultDiv = document.getElementById('dashboard');
            const errorDiv = document.getElementById('errorMsg');
            
            if (!name || !tag) {
                errorDiv.innerText = "Please enter both ID and Tag.";
                return;
            }

            errorDiv.innerText = '';
            document.getElementById('status').innerText = 'Fetching data from Tracker Network...';

            try {
                // TRN URL Structure: /v2/{game}/standard/profile/riot/{name}%23{tag}
                const encodedId = encodeURIComponent(`${name}#${tag}`);
                const targetUrl = `https://public-api.tracker.gg/v2/${gamePath}/standard/profile/riot/${encodedId}`;
                
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
                    method: 'GET',
                    headers: {
                        'TRN-Api-Key': trnApiKey,
                        'Accept': 'application/json'
                    }
                });

                const json = await response.json();

                if (json.errors || !json.data) {
                    throw new Error(json.errors ? json.errors[0].message : "Profile not found or private.");
                }

                const data = json.data;
                const platformInfo = data.platformInfo;
                const stats = data.segments[0].stats; // Segment 0 is usually lifetime/overall stats

                // Dynamically grab stats based on which game we are searching
                let stat1Title = gamePath === 'valorant' ? 'Current Rank' : 'Summoner Level';
                let stat1Value = gamePath === 'valorant' ? (stats.rank ? stats.rank.displayValue : 'Unranked') : (stats.level ? stats.level.displayValue : 'Unknown');
                
                let stat2Title = gamePath === 'valorant' ? 'K/D Ratio' : 'Matches Played';
                let stat2Value = gamePath === 'valorant' ? (stats.kdRatio ? stats.kdRatio.displayValue : 'N/A') : (stats.matchesPlayed ? stats.matchesPlayed.displayValue : 'N/A');

                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <div class="stat-box">
                        <img src="${platformInfo.avatarUrl || 'https://via.placeholder.com/100'}" class="profile-icon" alt="Avatar">
                        <h2>${platformInfo.platformUserHandle}</h2>
                        
                        <div class="stat-grid">
                            <div class="stat-item">
                                <strong>${stat1Title}</strong><br>
                                <span style="font-size: 1.2em; color: var(--theme-color);">${stat1Value}</span>
                            </div>
                            <div class="stat-item">
                                <strong>${stat2Title}</strong><br>
                                <span style="font-size: 1.2em; color: var(--theme-color);">${stat2Value}</span>
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('status').innerText = 'Data loaded successfully.';

            } catch (error) {
                console.error(error);
                errorDiv.innerText = `Error: ${error.message}. (Note: If CORS fails, the proxy might be down).`;
                document.getElementById('status').innerText = 'Ready.';
            }
        }
    </script>
</body>
</html>
