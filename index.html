<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Gaming Tracker</title>
    <style>
        :root {
            --val-red: #ff4655;
            --cs-orange: #de9b35;
            --r6-yellow: #ffb600;
            --val-dark: #111111;
            --val-gray: #ece8e1;
            --bg-panel: rgba(255, 255, 255, 0.05);
            --theme-color: var(--val-red); 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--val-dark);
            color: var(--val-gray);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            margin: 0;
            transition: background-color 0.3s;
        }

        h1 { color: var(--theme-color); text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s; }

        .game-selector { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }

        .game-tab {
            padding: 10px 20px; background-color: #222; color: #888;
            border: 2px solid transparent; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 16px; transition: 0.2s;
        }

        .game-tab.active { color: white; border-color: var(--theme-color); background-color: rgba(255, 255, 255, 0.1); }

        .search-container {
            background-color: var(--bg-panel); padding: 20px; border-radius: 8px;
            display: flex; gap: 10px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            justify-content: center; flex-wrap: wrap; max-width: 600px;
        }

        input, select {
            padding: 10px; font-size: 16px; border: none; border-radius: 4px;
            background-color: #222; color: white; outline: none;
        }
        input:focus, select:focus { box-shadow: 0 0 0 2px var(--theme-color); }

        button.action-btn {
            padding: 10px 20px; font-size: 16px; font-weight: bold;
            background-color: var(--theme-color); color: white; border: none;
            border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        button.action-btn:hover { filter: brightness(1.2); }
        
        #stopBtn { background-color: #555; display: none; }
        #stopBtn:hover { background-color: #777; }

        #status { font-size: 14px; color: #aaa; margin-bottom: 20px; height: 20px; text-align: center; }

        /* Dashboard Layout */
        .dashboard {
            display: none; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 800px;
        }
        
        /* Val Specific Dashboard Grids */
        .val-grid { grid-template-columns: 1fr 2fr; }

        .stat-box {
            background-color: var(--bg-panel); border-radius: 8px; padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .centered-box { text-align: center; }

        .profile-header {
            grid-column: 1 / -1; height: 150px; border-radius: 8px; background-size: cover;
            background-position: center; display: flex; align-items: flex-end; padding: 20px;
            box-sizing: border-box; border: 2px solid var(--theme-color); position: relative;
        }
        
        .profile-header::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.1)); border-radius: 6px; z-index: 1;
        }

        .profile-info { position: relative; z-index: 2; display: flex; align-items: center; gap: 20px; }
        .profile-icon { width: 80px; height: 80px; border-radius: 8px; border: 2px solid white; }
        .profile-info h2 { margin: 0; font-size: 28px; }
        .profile-info p { margin: 5px 0 0 0; color: #bbb; font-weight: bold; }

        .rank-card { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .rank-card h3 { margin-top: 0; color: var(--val-gray); }
        .rank-icon { width: 100px; margin: 10px 0; }
        .rank-name { font-size: 22px; font-weight: bold; margin: 0; color: var(--theme-color); }

        .match-item {
            display: flex; align-items: center; gap: 15px; background-color: rgba(0,0,0,0.3);
            padding: 10px; border-radius: 6px; margin-bottom: 10px;
        }
        .match-agent { width: 50px; height: 50px; border-radius: 50%; }
        .match-details { flex-grow: 1; }
        .win { color: #4CAF50; } .loss { color: #F44336; }
        .error { color: var(--theme-color); font-weight: bold; text-align: center; width: 100%; }
        
        .trn-stat-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; text-align: left;
        }
        .trn-stat-item {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 6px; border-left: 4px solid var(--theme-color);
        }
    </style>
</head>
<body>

    <h1 id="pageTitle">Valorant Tracker</h1>

    <div class="game-selector">
        <button class="game-tab active" id="tab-val" onclick="switchGame('valorant')">Valorant</button>
        <button class="game-tab" id="tab-cs" onclick="switchGame('cs')">CS2 / CS:GO</button>
        <button class="game-tab" id="tab-r6" onclick="switchGame('r6')">R6 Siege</button>
    </div>

    <div class="search-container" id="searchInputs">
        </div>

    <div id="status">Ready. Select a game to begin.</div>
    <div id="errorMsg" class="error"></div>

    <div class="dashboard" id="dashboard">
        </div>

    <script>
        // API KEYS
        const valApiKey = 'HDEV-2bf4c45f-2325-4ae7-a4e5-56c1753680f2'; 
        const trnApiKey = '8b483a0a-7d90-49fe-912b-911f5296d6c9'; 

        const proxyUrl = 'https://corsproxy.io/?';
        let currentGame = 'valorant';
        let valInterval;

        window.onload = () => switchGame('valorant');

        function switchGame(game) {
            currentGame = game;
            stopValTracking();
            
            const dash = document.getElementById('dashboard');
            dash.style.display = 'none';
            dash.className = 'dashboard'; // Reset classes
            
            document.getElementById('errorMsg').innerText = '';
            document.querySelectorAll('.game-tab').forEach(tab => tab.classList.remove('active'));
            
            const root = document.documentElement;
            const searchContainer = document.getElementById('searchInputs');

            if (game === 'valorant') {
                document.getElementById('tab-val').classList.add('active');
                root.style.setProperty('--theme-color', 'var(--val-red)');
                document.getElementById('pageTitle').innerText = "Valorant Tracker";
                searchContainer.innerHTML = `
                    <input type="text" id="valName" placeholder="Riot ID" required>
                    <input type="text" id="valTag" placeholder="Tag" required style="width: 100px;">
                    <button class="action-btn" onclick="startValTracking()">Search & Track</button>
                    <button id="stopBtn" class="action-btn" onclick="stopValTracking()">Stop</button>
                `;
            } else if (game === 'cs') {
                document.getElementById('tab-cs').classList.add('active');
                root.style.setProperty('--theme-color', 'var(--cs-orange)');
                document.getElementById('pageTitle').innerText = "CS2 / CS:GO Tracker";
                searchContainer.innerHTML = `
                    <input type="text" id="csId" placeholder="Steam ID (e.g. 765611...)" required style="width: 250px;">
                    <button class="action-btn" onclick="fetchTRNData('csgo', 'steam', document.getElementById('csId').value)">Search Stats</button>
                `;
            } else if (game === 'r6') {
                document.getElementById('tab-r6').classList.add('active');
                root.style.setProperty('--theme-color', 'var(--r6-yellow)');
                document.getElementById('pageTitle').innerText = "Rainbow Six Tracker";
                searchContainer.innerHTML = `
                    <input type="text" id="r6Name" placeholder="Ubisoft/PSN/Xbox Name" required style="width: 220px;">
                    <select id="r6Platform">
                        <option value="ubi">PC (Ubisoft Connect)</option>
                        <option value="psn">PlayStation</option>
                        <option value="xbl">Xbox</option>
                    </select>
                    <button class="action-btn" onclick="fetchTRNData('r6siege', document.getElementById('r6Platform').value, document.getElementById('r6Name').value)">Search Stats</button>
                `;
            }
        }

        // --- VALORANT LOGIC (HenrikDev API) ---

        function startValTracking() {
            document.getElementById('errorMsg').innerHTML = '';
            document.getElementById('stopBtn').style.display = 'inline-block';
            if (valInterval) clearInterval(valInterval);
            fetchValorantData(); 
            valInterval = setInterval(fetchValorantData, 12000); 
            document.getElementById('status').innerText = `Tracking Valorant stats live...`;
            document.getElementById('status').style.color = '#4CAF50';
        }

        function stopValTracking() {
            if (valInterval) clearInterval(valInterval);
            const stopBtn = document.getElementById('stopBtn');
            if(stopBtn) stopBtn.style.display = 'none';
            document.getElementById('status').innerText = 'Ready.';
            document.getElementById('status').style.color = '#aaa';
        }

        async function fetchValorantData() {
            const name = document.getElementById('valName').value.trim();
            const tag = document.getElementById('valTag').value.trim().replace('#', '');
            if (!name || !tag) return;

            const headers = { 'Authorization': valApiKey };

            try {
                const accRes = await fetch(`https://api.henrikdev.xyz/valorant/v1/account/${name}/${tag}`, { headers });
                const accJson = await accRes.json();
                if (accJson.status !== 200) throw new Error(accJson.errors[0].message);
                
                const acc = accJson.data;
                const region = acc.region;

                const [mmrRes, matchRes] = await Promise.all([
                    fetch(`https://api.henrikdev.xyz/valorant/v1/mmr/${region}/${name}/${tag}`, { headers }),
                    fetch(`https://api.henrikdev.xyz/valorant/v3/matches/${region}/${name}/${tag}?size=3`, { headers })
                ]);

                const mmrJson = await mmrRes.json();
                const matchJson = await matchRes.json();

                const dash = document.getElementById('dashboard');
                dash.className = 'dashboard val-grid'; // Use grid for val
                dash.style.display = 'grid';
                dash.innerHTML = `
                    <div class="profile-header" style="background-image: url('${acc.card.wide}')">
                        <div class="profile-info">
                            <img src="${acc.card.small}" class="profile-icon">
                            <div>
                                <h2>${acc.name} #${acc.tag}</h2>
                                <p>Level ${acc.account_level} • ${region.toUpperCase()}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="stat-box rank-card">
                        <h3>Current Rank</h3>
                        <img src="${mmrJson.data ? mmrJson.data.images.large : ''}" class="rank-icon">
                        <p class="rank-name">${mmrJson.data ? mmrJson.data.currenttierpatched : 'Unranked'}</p>
                        <p>${mmrJson.data ? mmrJson.data.ranking_in_tier + ' RR' : 'Hidden'}</p>
                    </div>

                    <div class="stat-box">
                        <h3 style="margin-top:0;">Recent Matches</h3>
                        <div id="valMatches"></div>
                    </div>
                `;

                let matchesHtml = '';
                if (matchJson.status === 200 && matchJson.data) {
                    matchJson.data.forEach(match => {
                        const me = match.players.all_players.find(p => p.name.toLowerCase() === name.toLowerCase());
                        if (me) {
                            let resultClass = ""; let resultText = match.metadata.mode;
                            const myTeam = me.team ? me.team.toLowerCase() : null;
                            if (match.teams && myTeam && match.teams[myTeam]) {
                                if (match.teams[myTeam].has_won) { resultClass = "win"; resultText = "VICTORY"; } 
                                else if (match.teams[myTeam].rounds_won < match.teams[myTeam].rounds_lost) { resultClass = "loss"; resultText = "DEFEAT"; }
                            }
                            matchesHtml += `
                                <div class="match-item">
                                    <img src="${me.assets.agent.small}" class="match-agent">
                                    <div class="match-details">
                                        <strong>${match.metadata.map}</strong><br>
                                        <span class="${resultClass}">${resultText}</span>
                                    </div>
                                    <div style="font-weight: bold;">${me.stats.kills} / ${me.stats.deaths} / ${me.stats.assists}</div>
                                </div>
                            `;
                        }
                    });
                }
                document.getElementById('valMatches').innerHTML = matchesHtml || '<p>No recent matches.</p>';

            } catch (error) {
                document.getElementById('errorMsg').innerText = `Error: ${error.message}`;
                stopValTracking();
            }
        }

        // --- CS2 & R6 LOGIC (TRN API) ---

        async function fetchTRNData(gamePath, platform, username) {
            username = username.trim();
            const resultDiv = document.getElementById('dashboard');
            const errorDiv = document.getElementById('errorMsg');
            
            if (!username) {
                errorDiv.innerText = "Please enter an ID or Username.";
                return;
            }

            errorDiv.innerText = '';
            document.getElementById('status').innerText = 'Pinging Tracker Network servers...';

            try {
                const encodedId = encodeURIComponent(username);
                const targetUrl = `https://public-api.tracker.gg/v2/${gamePath}/standard/profile/${platform}/${encodedId}`;
                
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
                    method: 'GET',
                    headers: {
                        'TRN-Api-Key': trnApiKey,
                        'Accept': 'application/json'
                    }
                });

                const json = await response.json();

                if (json.errors || !json.data) {
                    throw new Error(json.errors ? json.errors[0].message : "Profile not found or private.");
                }

                const data = json.data;
                const platformInfo = data.platformInfo;
                const stats = data.segments[0].stats; // Segment 0 contains lifetime overall stats

                // Smart Loop: Dynamically pulls the top 4 stats regardless of what TRN names them
                let statsHtml = '';
                let count = 0;
                for (const key in stats) {
                    if (count >= 4) break; 
                    const stat = stats[key];
                    statsHtml += `
                        <div class="trn-stat-item">
                            <strong style="color: #aaa;">${stat.displayName}</strong><br>
                            <span style="font-size: 1.6em; font-weight: bold; color: white;">${stat.displayValue}</span>
                        </div>
                    `;
                    count++;
                }

                resultDiv.className = 'dashboard'; // Reset to single column
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <div class="stat-box centered-box">
                        <img src="${platformInfo.avatarUrl || 'https://via.placeholder.com/100'}" style="width: 120px; border-radius: 50%; border: 3px solid var(--theme-color); margin-bottom: 10px;">
                        <h2 style="font-size: 32px; margin: 0;">${platformInfo.platformUserHandle}</h2>
                        
                        <div class="trn-stat-grid">
                            ${statsHtml}
                        </div>
                    </div>
                `;

                document.getElementById('status').innerText = 'Data successfully parsed and loaded.';

            } catch (error) {
                console.error(error);
                errorDiv.innerText = `Error: ${error.message} (Note: TRN CS2 often requires a pure 17-digit SteamID64).`;
                document.getElementById('status').innerText = 'Ready.';
            }
        }
    </script>
</body>
</html>
